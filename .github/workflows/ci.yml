name: CI - Build Only

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Задача: Только проверка стиля кода (без тестов)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # ... ваши шаги сборки ...

      # Шаг: Создание кастомного бейджа с результатом
      - name: Generate Dynamic Badge
        if: always() # Запускать даже если сборка упала
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          # Токен с правами на редактирование ваших гистов
          auth: ${{ secrets.GIST_SECRET }}
          # ID вашего гиста
          gistID: gist:7d296631c4aa401c7a4dfa43cfeac397
          # Имя файла в гисте
          filename: badge.json
          # Логика цвета: если успех - зеленый, иначе - красный
          label: "Моя Проверка"
          message: ${{ job.status }}
          valColorRange: ${{ job.status }}
          minColorRange: 0
          maxColorRange: 1