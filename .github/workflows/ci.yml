name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Отменяем предыдущие запуски для этого же PR/ветки, чтобы экономить ресурсы
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Задача: Линтинг и Тесты (Быстрая проверка на Ubuntu)
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Настройка Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Настройка Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Или ваша версия
          cache: 'npm' # Или 'pnpm', 'yarn'

      # Установка зависимостей
      - name: Install Dependencies
        run: npm ci

      # Rust: Clippy и Форматирование
      - name: Rust Lint
        run: cargo clippy -- -D warnings && cargo fmt --check

      # Rust: Тесты
      - name: Rust Test
        run: cargo test

      # TS: Линтинг (если настроен) и Тесты
      - name: TS Lint & Test
        run: npm run lint && npm run test
        continue-on-error: true # Если линтинг еще не настроен, чтобы не ломать CI сразу

  # 2. Задача: Сборка приложения (Кроссплатформенная проверка)
  build:
    needs: lint-and-test # Запускается только если линтинг прошел
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    
    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4

      # Настройка Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Настройка Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Установка зависимостей ОС для Linux (Tauri Action делает это автоматически, 
      # но для явной сборки через npm иногда нужно)
      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

      # Установка зависимостей Node
      - name: Install Node Dependencies
        run: npm ci

      # Сборка Tauri
      # Используем официальное действие, оно упрощает настройку окружения
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Мы не создаем релиз в CI, просто проверяем сборку
          release: false 
          # Если нужно собрать только конкретный таргет (опционально)
          # args: --target x86_64-pc-windows-msvc

      # (Опционально) Загрузка артефактов, чтобы проверить собранное приложение
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: matrix.platform == 'ubuntu-latest' # Чтобы не забивать хранилище всеми ОС
        with:
          name: tauri-app-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/**/*
