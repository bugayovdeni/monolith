<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/windows/main/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monolith</title>
    <script type="module" src="/src/windows/main/main.ts" defer></script>
  </head>

  <body>
    <div class="titlebar">        
      <!-- Логотип и Название -->
      <div class="app-identity">
        <!-- Эмблема -->
        <img src="" alt="Monolith Logo" class="app-logo" /> 
        <span class="app-name">MONOLITH<span style="font-size: 0.7em; opacity: 0.7;">v1.0</span></span>
      </div>        
      
      <!-- Дорожка -->
          <!-- Контейнер, который режет всё лишнее -->
      <div class="marquee-container">
          <!-- Дорожка, которая будет ездить -->
          <div class="marquee-track">
              <span class="marquee-content">
                  АСУ ТП — это боль, .NET — это память, Rust — это жизнь, а CSS — это магия. &nbsp;&nbsp;&nbsp;
              </span>
          </div>
      </div>
    </div>
    <main class="container">      
      <div id="chart-container"></div>
      <div id="sidebar">
        <!-- Кнопка теперь внутри, но позиционируется абсолютно -->
        <button class="toggle-btn">
          <!-- Иконка стрелки, чтобы было понятно -->
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:white;">
            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
          </svg>
        </button>

        <!-- Контент, который будет обрезаться -->
        <div class="sidebar-content">
          <p>Тут какая-то херня сбоку</p>
          <p>Которая исчезает</p>
        </div>
      </div>
    </main>
